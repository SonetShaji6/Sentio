name: Backend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'apps/backend/**'
      - 'packages/shared/**'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'apps/backend/**'
      - 'packages/shared/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
    - run: npm ci
    - run: npm run build --workspace=apps/backend
