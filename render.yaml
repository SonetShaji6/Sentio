services:
  - type: web
    name: sentio-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run build -w packages/shared && npm run build -w apps/backend
    startCommand: node apps/backend/dist/server.js
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: MONGO_URI
        sync: false # set manually in dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false # set to your Vercel URL after frontend deploy
